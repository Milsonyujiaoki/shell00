name: C CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            valgrind

      - name: Build
        run: make

      - name: Run tests
        run: make test || true

      - name: Valgrind
        run: valgrind --leak-check=full ./program || true
